<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Homework</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body>
    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab('hw1')">Bài 01</button>
        <button class="tab-btn" onclick="openTab('hw2')">Bài 02</button>
        <button class="tab-btn" onclick="openTab('hw3')">Bài 03</button>
        <button class="tab-btn" onclick="openTab('hw4')">Bài 04</button>
    </nav>

    <main id="content-container">
        <section class="prompt-section">
            <h2>Yêu cầu bài tập</h2>
            <div id="prompt-content"></div>
        </section>

        <section class="bottom-section">
            <div class="demo-box">
                <h2>Demo Trực Quan</h2>
                <div id="demo-content"></div>
            </div>

            <div class="explain-box">
                <h2>Giải thích & Source Code</h2>
                <div id="explain-content" style="margin-bottom: 15px;"></div>
                <h4 style="margin-bottom: 10px; color: #7f8c8d;" id="file-name-display">File: </h4>
                <pre><code id="code-block">Đang tải code...</code></pre>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
